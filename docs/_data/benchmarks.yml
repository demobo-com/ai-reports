# Benchmark history data.
#
# Each top-level entry is one benchmark. Append to `history` to record a new
# datapoint (date, system, score, source). Scores are percentages (0-100).
#
# Keep entries within each benchmark's `history` sorted oldest-first.
# The front page renders all snapshots and highlights the latest.
#
# human_baseline is optional — set only when the benchmark authors publish one.
# Use null otherwise.

