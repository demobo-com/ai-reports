# maturity_score is an editorial 0-100 judgement of production-readiness, taking into
# account both raw benchmark scores AND practical reliability (error recovery,
# long-horizon stability, how well scores transfer from benchmarks to real work).
#
# Color tiers rendered in the UI:
#   >= 70  → green  (mature, usable in production with standard safeguards)
#   40-69  → orange (useful but brittle; copilot-grade, not autonomous)
#   <  40  → red    (demos only; unreliable for delegated work)
#
# Update this score as the field evolves. Typically changes only a few points per quarter.

